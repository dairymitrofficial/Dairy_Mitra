{% extends "base.html" %}
{% block title %}ग्राहक जोडा{% endblock %}

{% block content %}

<h2 class="page-title flex items-center gap-2">
  <div class="icon-user-plus" data-lucide="user-plus"></div>
  ग्राहक जोडा
</h2>

<form method="POST"
      class="section grid gap-4 max-w-lg"
      onsubmit="return confirm('जर हा ID आधीच अस्तित्वात असेल तर बाकी vendors shift होतील. पुढे जायचं का?')">

    <!-- Vendor Name -->
    <div>
        <label class="form-label">ग्राहकाचे नाव</label>
        <input type="text"
               name="name"
               placeholder="ग्राहकाचे नाव"
               required
               class="form-input">
    </div>

    <!-- Auto Vendor ID -->
    <div>
        <label class="form-label">ग्राहक ID</label>

        <input type="number"
               name="vendor_id"
               value="{{ next_vendor_id }}"
               required
               class="form-input">

        <small style="color:gray">
            (हा ID auto आहे, पण तुम्ही बदलू शकता)
        </small>
    </div>

    <!-- Address -->
    <div>
        <label class="form-label">गाव</label>
        <input type="text"
               name="address"
               placeholder="गाव"
               required
               class="form-input">
    </div>

    <!-- Milk Type -->
    <div>
        <label class="form-label">दूध प्रकार</label>

        <select name="milk_type"
                required
                class="form-select">

            <option value="cow">गायीचे दूध</option>
            <option value="buffalo">म्हशीचे दूध</option>
            <option value="both">गाय - म्हैस</option>

        </select>
    </div>

    <!-- Phone -->
    <div>
        <label class="form-label">फोन नंबर</label>

        <input type="text"
               name="phone"
               placeholder="फोन नंबर"
               class="form-input">
    </div>

    <!-- Submit -->
    <button type="submit"
            class="btn btn-primary">

        ग्राहक जोडा

    </button>

</form>

{% endblock %}
