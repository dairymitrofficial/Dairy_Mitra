{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-4">About DairyMitr</h1>
  <p class="mb-6 text-gray-700">
    DairyMitr हा एक आधुनिक dairy management platform आहे. 
    दूध संकलन, vendor management, payment व reporting साठी सोपं समाधान.
  </p>

  <h2 class="text-2xl font-semibold mb-2">Feedback</h2>
  <form method="POST" class="space-y-4">
    <input name="name" placeholder="नाव" class="w-full p-2 border rounded" required>
    <textarea name="message" placeholder="आपला feedback..." class="w-full p-2 border rounded" required></textarea>
    <button class="bg-indigo-600 text-white px-4 py-2 rounded">Send</button>
  </form>
</div>
{% endblock %}
