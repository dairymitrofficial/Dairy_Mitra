<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <title>Signup - Dairy Mitr</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='images/Logo-img.png') }}" class="auth-logo">
    <h5 class="auth-title">नवीन खाते तयार करा</h5>
    <p class="auth-subtitle">Dairy Mitr मध्ये स्वागत आहे</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="dairy_name" name="dairy_name" placeholder="Dairy Name" required>
        <label for="dairy_name"><i class="fa-solid fa-cow"></i> डेअरीचं नाव</label>
      </div>
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
        <label for="email"><i class="fa-solid fa-envelope"></i> ई-मेल</label>
      </div>
      <div class="form-floating mb-3">
        <input type="tel" class="form-control" id="phone" name="phone" placeholder="Phone">
        <label for="phone"><i class="fa-solid fa-phone"></i> मोबाईल</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
        <label for="password"><i class="fa-solid fa-lock"></i> पासवर्ड</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
        <label for="confirm_password"><i class="fa-solid fa-lock"></i> पासवर्ड पुन्हा लिहा</label>
      </div>
      <button type="submit" class="btn btn-success w-100 btn-auth"><i class="fa-solid fa-user-plus"></i> खाते तयार करा</button>
    </form>

    <div class="auth-links mt-3 text-center">
      <a href="{{ url_for('login') }}">आधीपासून खाते आहे? लॉगिन करा</a>
    </div>
  </div>
</body>
</html>
