<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <title>Verify Reset OTP - Dairy Mitr</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-card">
    <h5 class="auth-title">OTP तपासा</h5>
    <p class="auth-subtitle">OTP ई-मेल वर पाठवला आहे: <strong>{{ email }}</strong></p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="otp" name="otp" placeholder="Enter OTP" required>
        <label for="otp">OTP</label>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-auth">Verify OTP</button>
    </form>
  </div>
</body>
</html>
