<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - Dairy Mitr</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body class="auth-body">
  <div class="auth-card">
    <h5 class="auth-title">नवीन पासवर्ड</h5>
    <p class="auth-subtitle">तुमचा नवीन पासवर्ड टाका</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
        <label for="password">नवीन पासवर्ड</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm" required>
        <label for="confirm_password">पासवर्ड पुन्हा लिहा</label>
      </div>
      <button type="submit" class="btn btn-success w-100 btn-auth">Reset Password</button>
    </form>
  </div>
</body>
</html>
