<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - Dairy Mitr</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

</head>
<body class="auth-body">
  <div class="auth-card">
    <h5 class="auth-title">पासवर्ड विसरलात?</h5>
    <p class="auth-subtitle">तुमचा ई-मेल टाका, आम्ही OTP पाठवू.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
        <label for="email">ई-मेल</label>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-auth">OTP पाठवा</button>
    </form>

    <div class="auth-links mt-3 text-center">
      <a href="{{ url_for('login') }}">परत लॉगिन करा</a>
    </div>
  </div>
</body>
</html>
