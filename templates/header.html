<header class="bg-white border-b border-slate-200 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <!-- Left: Logo + Name -->
      <div class="flex items-center">
        <a href="{{ url_for('dashboard') }}">
          <img src="{{ url_for('static', filename='images/Logo2.png') }}" alt="Logo" class="h-10 w-auto">
        </a>
        <a href="{{ url_for('dashboard') }}">
          <img src="{{ url_for('static', filename='images/Logo-Text.png') }}" alt="Dairy Name" class="h-8 ml-3">
        </a>
      </div>

      <!-- Right: Nav links desktop -->
      <div class="hidden md:flex items-center space-x-6">
         <a href="{{ url_for('dashboard') }}" class="text-slate-600 hover:text-indigo-600">Home</a>
        <a href="{{ url_for('about') }}" class="text-slate-600 hover:text-indigo-600">About</a>
        <a href="{{ url_for('learn') }}" class="text-slate-600 hover:text-indigo-600">Learn</a>
        <a href="{{ url_for('account') }}" class="text-slate-600 hover:text-indigo-600">Account</a>
      </div>

      <!-- Mobile menu button -->
      <div class="md:hidden flex items-center">
        <button id="sidebar-toggle" class="p-2 text-slate-700 hover:text-indigo-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>
