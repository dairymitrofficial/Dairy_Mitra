{% extends "base.html" %}
{% block title %}अंतिम पेमेंट{% endblock %}

{% block content %}
<h2 class="page-title">💰 अंतिम पेमेंट</h2>

<form method="POST" class="grid gap-4 md:grid-cols-3 mb-6 section">
    <div>
        <label class="form-label">पासून तारीख</label>
        <input type="date" name="start_date" required class="form-input">
    </div>
    <div>
        <label class="form-label">पर्यंत तारीख</label>
        <input type="date" name="end_date" required class="form-input">
    </div>
    <div class="flex items-end">
        <button type="submit" class="btn btn-primary w-full">पेमेंट मिळवा</button>
    </div>
</form>

<div class="mb-4">
    <input type="text" id="vendorSearch" class="form-input max-w-md" 
           placeholder="विक्रेता आयडी किंवा नावाने शोधा" onkeyup="filterVendors()">
</div>

{% if data %}
<div class="table-wrap">
    <table class="table">
        <thead>
            <tr>
                <th>विक्रेता आयडी</th>
                <th>नाव</th>
                <th>एकूण रक्कम</th>
            </tr>
        </thead>
        <tbody>
            {% for d in data %}
            <tr>
                <td>{{ d.vendor_id }}</td>
                <td>{{ d.vendor_name }}</td>
                <td style="color: red;"><b>₹{{ d.total_payment|int }}</b></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endif %}

<script>
function filterVendors() {
    const input = document.getElementById("vendorSearch").value.toLowerCase();
    const rows = document.querySelectorAll("tbody tr");
    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}
</script>
{% endblock %}
