{% extends "base.html" %}

{% block title %}दूध संकलन - Dairy Mitr{% endblock %}

{% block content %}
<h2 class="page-title">दूध संकलन</h2>

<!-- Set Date and Slot -->
<form method="POST" class="mb-4 flex flex-wrap items-center gap-4">
    <div>
      <label class="form-label">दिनांक</label>
      <input type="date" class="form-input" name="date" value="{{ today_date }}" required>
    </div>
    <div>
      <label class="form-label">वेळ</label>
      <select name="slot" class="form-select" required>
          <option value="morning" {% if current_slot == 'morning' %}selected{% endif %}>सकाळ</option>
          <option value="evening" {% if current_slot == 'evening' %}selected{% endif %}>संध्याकाळ</option>
      </select>
    </div>

    <div class="pt-6">
      <button type="submit" name="set_date_slot" class="btn btn-primary">दिनांक व वेळ सेट करा</button>
    </div>
</form>

<!-- Hidden selected date for JS -->
<input type="hidden" id="selected_date" value="{{ selected_date }}">

<!-- Search Filter -->
<div class="mb-4">
  <input type="text" id="vendorSearch" 
         class="form-input w-72"
         placeholder="ग्राहक आयडी किंवा नाव शोधा"
         onkeyup="filterVendors()">
</div>

<!-- Milk Entry Table -->
<div class="table-wrap">
<form method="POST">
    <input type="hidden" name="total_vendors" value="{{ vendors|length }}">
    <table class="table" id="vendorTable">
        <thead>
            <tr>
                <th>ग्राहक आयडी</th>
                <th>नाव</th>
                <th>दूध प्रकार</th>
                <th>प्रमाण (लिटर)</th>
                <th>कारवाई</th>
            </tr>
        </thead>
        <tbody>
        {% for v in vendors %}
            <tr id="row-{{ loop.index0 }}">
                <td>
                    {{ v.vendor_id }}
                    <input type="hidden" id="vendor_id_{{ loop.index0 }}" value="{{ v.vendor_id }}">
                </td>
                <td>{{ v.name }}</td>
                <td>
                    <select id="milk_type_{{ loop.index0 }}" class="form-select">
                        <option value="cow">गाय</option>
                        <option value="buffalo">म्हैस</option>
                    </select>
                </td>
                <td>
                    <input type="number" id="quantity_{{ loop.index0 }}" class="form-input w-28" step="0.1">
                </td>
                <td>
                    <button type="button" class="btn btn-secondary" onclick="submitVendorMilk({{ loop.index0 }})">सबमिट</button>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>

<!-- Final Submit -->
<div class="mt-4">
  <button type="button" class="btn btn-primary" onclick="finalSubmit()">
      अंतिम सबमिट (सर्व सेव्ह करा)
  </button>
</div>
</form>
{% endblock %}

{% block scripts %}
<script>
// Live filter by vendor ID or name
function filterVendors() {
    const input = document.getElementById("vendorSearch").value.toLowerCase();
    const rows = document.querySelectorAll("#vendorTable tbody tr");
    rows.forEach(row => {
        const id = row.cells[0].textContent.toLowerCase();
        const name = row.cells[1].textContent.toLowerCase();
        row.style.display = id.includes(input) || name.includes(input) ? "" : "none";
    });
}

// AJAX per-vendor submission
function submitVendorMilk(index) {
    const vendor_id = document.getElementById('vendor_id_' + index).value;
    const milk_type = document.getElementById('milk_type_' + index).value;
    const quantity = document.getElementById('quantity_' + index).value;
    const date = document.getElementById('selected_date').value;
    const slot = document.querySelector('select[name="slot"]').value; // ✅ always dropdown value

    if (!quantity) {
        alert("कृपया प्रमाण भरवा.");
        return;
    }

    fetch("/submit_milk_ajax", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ vendor_id, milk_type, quantity, date, slot })
    })
    .then(response => response.json())
    .then(data => {
        alert(data.message);
    })
    .catch(error => {
        console.error("Error:", error);
        alert("दूध माहिती सबमिट करण्यात अडचण आली.");
    });
}

// Bulk Submit
function finalSubmit() {
    const rows = document.querySelectorAll("#vendorTable tbody tr");
    const date = document.getElementById('selected_date').value;
    const slot = document.querySelector('select[name="slot"]').value; // ✅ always dropdown value
    let data = [];

    rows.forEach((row, index) => {
        const vendor_id = document.getElementById('vendor_id_' + index).value;
        const milk_type = document.getElementById('milk_type_' + index).value;
        const quantity = document.getElementById('quantity_' + index).value;

        if (quantity) {
            data.push({ vendor_id, milk_type, quantity, date, slot });
        }
    });

    if (data.length === 0) {
        alert("कृपया किमान एक प्रमाण भरा.");
        return;
    }

    fetch("/submit_bulk_milk_ajax", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ vendors: data })
    })
    .then(response => response.json())
    .then(result => {
        alert(result.message);
        window.location.reload();  // ✅ Reset page after saving
    })
    .catch(error => {
        console.error("Bulk submit failed:", error);
        alert("सर्व डेटा सेव्ह करताना अडचण आली.");
    });
}

window.addEventListener("DOMContentLoaded", function() {
    const now = new Date();   // browser/mobile ची local time
    const hour = now.getHours();
    const slotSelect = document.querySelector('select[name="slot"]');

    if (hour < 15) {
        slotSelect.value = "morning";
    } else {
        slotSelect.value = "evening";
    }
});
</script>
{% endblock %}
